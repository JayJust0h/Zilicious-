<!DOCTYPE html>
<html>
<head>
  <title>RidgIT Invoices</title>
</head>
<body>
<h2>Invoice System</h2>

<input id="orderId" placeholder="Order ID">
<input id="eventDate" type="date">
<button onclick="save()">Save Invoice</button>

<script>
const TZ = {
  today(){ return new Date().toISOString().split('T')[0]; },
  normalize(d){
    if(!d) return '';
    if(/^\d{4}-\d{2}-\d{2}$/.test(d)) return d;
    return new Date(d).toISOString().split('T')[0];
  }
};

const SHEET_URL = "YOUR_SCRIPT_URL";
let INVOICES_CACHE = [];

async function loadInvoices(){
  const res = await fetch(SHEET_URL + "?action=getInvoices");
  const data = await res.json();
  INVOICES_CACHE = data.invoices || [];
  console.log("Invoices:", INVOICES_CACHE);
}

function buildPayload(){
  const orderId = document.getElementById("orderId").value.trim();
  const eventDate = TZ.normalize(document.getElementById("eventDate").value);

  return {
    orderId,
    invoiceId: "INV-" + orderId,
    eventDate,
    exportedAt: new Date().toISOString()
  };
}

async function save(){
  const payload = buildPayload();
  console.log("Saving:", payload);

  await fetch(SHEET_URL + "?action=saveInvoice", {
    method: "POST",
    body: JSON.stringify(payload)
  });

  await loadInvoices();
}

document.getElementById("eventDate").value = TZ.today();
loadInvoices();
</script>
</body>
</html>
